<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>BenSync · Captive Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#e3eae5;font-family:Manrope,"Helvetica Neue",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  h1{font-family:Sora,Manrope,sans-serif}
  a{color:#1F8A5B}a:hover{color:#16714A}
  .cp{--bg:#f3f6f4;--surface:#ffffff;--inset:#f5f8f6;--text:#0F2A47;--text2:#5d6f7e;--line:#e2e8e4;--line2:#c9d4cd;--accent:#1F8A5B;--accent-ink:#ffffff;--accent-soft:rgba(31,138,91,.09);--good:#16714A;--good-soft:rgba(22,113,74,.11);--warn:#96700f;--warn-soft:rgba(150,112,15,.12);--serious:#b3511c;--serious-soft:rgba(179,81,28,.11);--crit:#b02a37;--crit-soft:rgba(176,42,55,.1);--muted:#93a3ad;--muted-soft:rgba(147,163,173,.16);--rp:4px;font-variant-numeric:tabular-nums}
  .cp[data-theme="dark"]{--bg:#0B2138;--surface:#122c47;--inset:#0e2439;--text:#e9f0f5;--text2:#92a7b8;--line:#1d3a57;--line2:#2b4c6e;--accent:#7FD6A8;--accent-ink:#0B2138;--accent-soft:rgba(127,214,168,.14);--good:#7FD6A8;--good-soft:rgba(127,214,168,.14);--warn:#d9ad2b;--warn-soft:rgba(217,173,43,.13);--serious:#e0793f;--serious-soft:rgba(224,121,63,.13);--crit:#e5606c;--crit-soft:rgba(229,96,108,.13);--muted:#5d768c;--muted-soft:rgba(93,118,140,.28)}
  .cp[data-theme="dark"] .bs-logo{filter:brightness(0) invert(1)}
  .cp[data-density="comfortable"]{--rp:8px}
  .cp ::-webkit-scrollbar{width:10px;height:10px}.cp ::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px}.cp ::-webkit-scrollbar-track{background:transparent}
  .cp input,.cp select,.cp textarea,.cp button{font-family:inherit;font-variant-numeric:tabular-nums}
  .cp .hov{transition:background .08s}
  .cp .hov:hover{background:var(--accent-soft)!important}
  .cp table{border-collapse:collapse}
  *{box-sizing:border-box}
</style>
</head>
<body>
  <div id="root" class="cp" data-theme="light" data-density="comfortable" style="min-height:100vh;background:var(--bg);color:var(--text);font-size:13px">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#5d6f7e;font-size:13px">Loading…</div>
  </div>
  <script src="/captive/app.js"></script>
</body>
</html>
