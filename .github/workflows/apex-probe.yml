name: Apex domain probe
on:
  push:
    paths:
      - ".github/workflows/apex-probe.yml"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Compare old vs new system
        run: |
          CREDS='{"email":"admin@kennion.com","password":"admin123"}'
          for site in www.kennion.com www.bensync.com; do
            curl -s -c /tmp/j -o /dev/null -w "$site login: %{http_code}\n" -X POST -H "Content-Type: application/json" -d "$CREDS" "https://$site/api/auth/login"
            curl -s -b /tmp/j -o /tmp/g.json "https://$site/api/admin/groups"
            curl -s -b /tmp/j -o /tmp/q.json "https://$site/api/admin/quotes"
            curl -s -b /tmp/j -o /tmp/u.json "https://$site/api/admin/users"
            echo "$site groups: $(jq 'length' /tmp/g.json 2>/dev/null || echo err)  quotes: $(jq 'length' /tmp/q.json 2>/dev/null || echo err)  users: $(jq 'length' /tmp/u.json 2>/dev/null || echo err)"
            echo "$site first groups: $(jq -r '[.[0:3][] | .companyName] | join(", ")' /tmp/g.json 2>/dev/null || echo err)"
            rm -f /tmp/j
          done
