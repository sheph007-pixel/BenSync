name: Live smoke check
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Probe live site
        run: |
          echo "== login and count groups =="
          curl -s -c /tmp/cj -o /tmp/login.json -w "login: %{http_code}\n" -X POST -H "Content-Type: application/json" -d '{"email":"admin@kennion.com","password":"admin123"}' https://www.bensync.com/api/auth/login || true
          curl -s -b /tmp/cj -o /tmp/groups.json -w "admin-groups: %{http_code}\n" https://www.bensync.com/api/admin/groups || true
          echo "group count: $(jq 'length' /tmp/groups.json 2>/dev/null || echo unparseable)"
          jq -r '.[0:3][] | .companyName' /tmp/groups.json 2>/dev/null || head -c 200 /tmp/groups.json || true
