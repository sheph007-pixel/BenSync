name: Migrate data
on:
  push:
    paths:
      - ".github/workflows/migrate-data.yml"
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Copy all data from old system to BenSync
        run: |
          set -e
          KEN=https://www.kennion.com
          BEN=https://www.bensync.com
          CREDS='{"email":"admin@kennion.com","password":"admin123"}'

          echo "== wait for both deploys to expose the migration endpoints =="
          for i in $(seq 1 45); do
            k=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$KEN/api/admin/migrate-export?table=users" || echo 000)
            b=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 -X POST -H "Content-Type: application/json" -d '{}' "$BEN/api/admin/migrate-import" || echo 000)
            echo "poll $i: kennion export=$k bensync import=$b"
            if [ "$k" = "401" ] && [ "$b" = "401" ]; then break; fi
            sleep 20
          done
          if [ "$k" != "401" ] || [ "$b" != "401" ]; then
            echo "endpoints never came up (kennion=$k bensync=$b)"; exit 1
          fi

          echo "== login to both =="
          curl -s -c /tmp/ken.jar -o /tmp/kl.json -w "kennion login: %{http_code}\n" -X POST -H "Content-Type: application/json" -d "$CREDS" "$KEN/api/auth/login"
          curl -s -c /tmp/ben.jar -o /tmp/bl.json -w "bensync login: %{http_code}\n" -X POST -H "Content-Type: application/json" -d "$CREDS" "$BEN/api/auth/login"

          relogin_ben () {
            curl -s -c /tmp/ben.jar -o /dev/null -w "bensync re-login: %{http_code}\n" -X POST -H "Content-Type: application/json" -d "$CREDS" "$BEN/api/auth/login"
          }

          copy_table () {
            table=$1; limit=$2; offset=0; total=0
            while true; do
              curl -s -b /tmp/ken.jar -o /tmp/chunk.json --max-time 120 "$KEN/api/admin/migrate-export?table=$table&offset=$offset&limit=$limit"
              count=$(jq '.count // -1' /tmp/chunk.json 2>/dev/null || echo -1)
              if [ "$count" -lt 0 ]; then
                echo "$table: export error: $(jq -r '.message // "unparseable"' /tmp/chunk.json 2>/dev/null | head -c 200)"
                exit 1
              fi
              [ "$count" -eq 0 ] && break
              jq '{table: .table, rows: .rows}' /tmp/chunk.json > /tmp/body.json
              resp=$(curl -s -b /tmp/ben.jar --max-time 300 -X POST -H "Content-Type: application/json" --data-binary @/tmp/body.json "$BEN/api/admin/migrate-import")
              ok=$(echo "$resp" | jq -r '.ok // false' 2>/dev/null || echo false)
              if [ "$ok" != "true" ]; then
                relogin_ben
                resp=$(curl -s -b /tmp/ben.jar --max-time 300 -X POST -H "Content-Type: application/json" --data-binary @/tmp/body.json "$BEN/api/admin/migrate-import")
                ok=$(echo "$resp" | jq -r '.ok // false' 2>/dev/null || echo false)
              fi
              echo "$table offset $offset: exported $count, import $(echo "$resp" | jq -c '{ok, received, inserted, message}' 2>/dev/null | head -c 200)"
              if [ "$ok" != "true" ]; then echo "$table: import failed, aborting"; exit 1; fi
              total=$((total + count))
              offset=$((offset + count))
            done
            echo "$table: copied $total rows"
          }

          copy_table users 200
          relogin_ben
          copy_table groups 100
          copy_table census_entries 500
          copy_table proposals 3
          copy_table risk_screens 3

          echo "== verify =="
          relogin_ben
          curl -s -b /tmp/ben.jar -o /tmp/groups.json -w "bensync admin groups: %{http_code}\n" "$BEN/api/admin/groups"
          echo "bensync group count: $(jq 'length' /tmp/groups.json 2>/dev/null || echo unparseable)"
